aid: leya
name: Leya
description: >-
  Leya was a Stockholm-based legal AI startup founded in 2023 by Max
  Junestrand (CEO) and Sigge Labor, building an AI-powered workspace for
  law firms and legal professionals that automated repetitive document
  review, drafting, and legal research tasks across public sources and a
  firm's own private data. The company went through Y Combinator
  (Winter 2024 batch), partnered with leading Nordic firms such as
  Mannheimer Swartling beginning May 2023, raised a $10.5M seed (May
  2024) and a $25M Series A (July 2024), and was named one of
  Stockholm's hottest startups by WIRED in 2024. Leya offered a
  collaborative legal AI workspace with tabular review (large-scale
  parallel document analysis) and was rolled out to 200+ law firms
  across 15+ countries under the Leya brand. On 19 February 2025 the
  company fully rebranded to Legora, retaining the same founders,
  Stockholm headquarters, and product, while expanding with agentic
  research tools and a Microsoft Word add-in. The Leya brand and
  product line have been entirely absorbed into Legora; there is no
  separate ongoing Leya product, no public developer API, no SDK, and
  no GitHub presence under the Leya name. This entry preserves the
  Leya identity for historical reference; see the legora entry for the
  ongoing company profile.
